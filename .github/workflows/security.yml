name: security

# Security scanning suite for seqtoid-web (ITARS, CZID-261). Mirrors the
# refactor-line app suite (CZID-102 / improvement-#010, CZID-98 pins) and adds
# CodeQL SAST. Self-contained: GitHub-hosted ubuntu-latest, no customer infra.
#   - gitleaks : secrets across git history — HARD-FAIL (fixture FPs → .gitleaks.toml)
#   - trivy    : dependency CVE + misconfig + secret (fs) — REPORT-ONLY first pass
#   - codeql   : Ruby / JavaScript-TypeScript / Python SAST — results to the Security tab
# (brakeman + rubocop already run in check.yml / pull-request-only.yml.)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks (secrets, hard-fail)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VER=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
      - name: Scan git history for secrets
        # CLI binary (MIT) — honors .gitleaks.toml (dev/test fixture allowlist).
        run: gitleaks git . --redact --no-banner --exit-code 1

  trivy:
    name: trivy fs (vuln/misconfig/secret, report-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0 # TODO(CZID-261): ratchet to 1 once the backlog is triaged

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ruby, javascript-typescript, python]
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3
