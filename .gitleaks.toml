# gitleaks config (ITARS, CZID-261). Extends the default ruleset and allowlists
# known dev/test fixtures that are NOT real secrets, so the hard-fail gate stays
# meaningful (any real secret committed elsewhere still fails the build).
title = "seqtoid-web gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = """Known dev/test fixtures and expired tokens (reviewed — not real secrets):
- config/secrets.yml: dev/test secret_key_base (prod/staging read SECRET_KEY_BASE from ENV).
- test/fixtures/*.pem: test fixture keys (e.g. czid-private-key.pem), used to sign tokens in specs.
- db/seeds.rb: expired ASIA temporary STS tokens embedded in S3 presigned URLs (captured 2022,
  presigned URLs are time-boxed → long expired/inert).
- the dummy CI AUTH_TOKEN_SECRET value (marked throwaway in check.yml)."""
paths = [
  '''config/secrets\.yml''',
  '''test/fixtures/.*\.pem''',
  '''db/seeds\.rb''',
]
regexes = [
  '''GYbvZ9/uHy75wWWK4BO3jZGJ0noacv7GbTJI96wZgWQ=''',
]

[[allowlists]]
description = """Two history-only generic-api-key false positives (gone from HEAD), scoped by commit:
- config/initializers/devise.rb @2ac2a771 (2017): the COMMENTED-OUT Devise generator example
  `# config.secret_key = '...'` placeholder — not an active secret.
- app/controllers/auth0_controller.rb @217aee56 (2019): the rule matched a token-refresh constant,
  not a secret.
Scoped to these commits so both files stay scanned for any future real secret."""
commits = [
  "217aee56a71e24fa55d7013205ed900842b052b4",
  "2ac2a7712e06aa9675d8a85028c4744a294903ef",
]
