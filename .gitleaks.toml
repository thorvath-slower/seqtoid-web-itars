# gitleaks config (ITARS, CZID-261). Extends the default ruleset and allowlists
# known dev/test fixtures that are NOT real secrets, so the hard-fail gate stays
# meaningful (any real secret committed elsewhere still fails the build).
title = "seqtoid-web gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = """Known dev/test fixtures and expired tokens (reviewed — not real secrets):
- config/secrets.yml: dev/test secret_key_base (prod/staging read SECRET_KEY_BASE from ENV).
- test/fixtures/*.pem: test fixture keys (e.g. czid-private-key.pem), used to sign tokens in specs.
- db/seeds.rb: expired ASIA temporary STS tokens embedded in S3 presigned URLs (captured 2022,
  presigned URLs are time-boxed → long expired/inert).
- the dummy CI AUTH_TOKEN_SECRET value (marked throwaway in check.yml)."""
paths = [
  '''config/secrets\.yml''',
  '''test/fixtures/.*\.pem''',
  '''db/seeds\.rb''',
]
regexes = [
  '''GYbvZ9/uHy75wWWK4BO3jZGJ0noacv7GbTJI96wZgWQ=''',
]

# Two history-only generic-api-key false positives (both gone from HEAD). These
# were previously allowlisted by commit SHA, but the CZID-265 history rewrite
# (git filter-repo) re-hashed every commit, so the pinned SHAs stopped matching
# and gitleaks went red on main. Allowlisted here in a rewrite-proof way instead
# (by path / by value), so a future history rewrite can't break the gate again.

[[allowlists]]
description = """config/initializers/devise.rb: the COMMENTED-OUT Devise generator
placeholder `# config.secret_key = '<128 hex>'` (never active — Devise used
secret_key_base). The file was removed from HEAD in "Remove Devise - part 2", so
allowlisting the whole path costs no ongoing scan coverage and survives rewrites."""
paths = [
  '''config/initializers/devise\.rb''',
]

[[allowlists]]
description = """app/controllers/auth0_controller.rb: generic-api-key mis-flagged the
literal value of the MIN_TOKEN_REFRESH_IN_SECONDS constant (`60.seconds.to_i`).
Allowlisted by that exact value so the controller stays scanned for real secrets."""
regexes = [
  '''60\.seconds\.to_i''',
]
